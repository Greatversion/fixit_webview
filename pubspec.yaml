name: fixit_webview
description: A production-grade Flutter WebView plugin with JS bridge, native Dart module integration, offline engine, theme engine, and enterprise-grade navigation controls.
version: 0.9.0-beta.1
publish_to: none
repository: https://github.com/anomalyco/fixit_webview
homepage: https://fixit.ai
issue_tracker: https://github.com/anomalyco/fixit_webview/issues
documentation: https://fixit.ai/docs/webview
topics: 
  - webview
  - web
  - browser
  - bridge
  - offline
  - theme

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  fixit_core:
    path: ../fixit_core
  path_provider: ^2.0.15
  plugin_platform_interface: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^10.1.6
