name: fixit_webview
description: A production-grade Flutter WebView plugin with JS bridge, native Dart module integration, offline engine, theme engine, and enterprise-grade navigation controls.
version: 0.10.0-beta.2
repository: https://github.com/Greatversion/fixit_webview
issue_tracker: https://github.com/Greatversion/fixit_webview/issues
topics: 
  - webview
  - browser
  - bridge
  - offline
  - theme

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  fixit_core: ^1.0.0
  path_provider: ^2.1.0
  plugin_platform_interface: ^2.1.4

flutter:
  plugin:
    platforms:
      android:
        package: com.fixit.fixit_webview
        pluginClass: FixitWebviewPlugin
      ios:
        pluginClass: FixitWebviewPlugin

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^10.1.6
